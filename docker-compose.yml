# docker-compose.yml (Development Version)

services:
  web:
    image: ${DOCKER_REGISTRY:-local}/ai_php_web:latest
    container_name: ai_php_web
    user: "root"
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./.env:/var/www/html/.env
      - /mnt/c/Users/Admin-PC/AppData/Local/localsy/uploads:/var/www/html/uploads
    environment:
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - REDIS_HOST=${REDIS_HOST}
      - SEARXNG_HOST=${SEARXNG_HOST}
      - FLARESOLVERR_HOST=${FLARESOLVERR_HOST}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mysql
      - redis
      - searxng
      - flaresolverr
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: ai_mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASS}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ai_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: ai_searxng
    ports:
      - "8888:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: ai_flaresolverr
    ports:
      - "8191:8191"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - TZ=${TZ}
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data: